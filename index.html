<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Romantic Lock</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Great+Vibes&amp;display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">


  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full w-full m-0 p-0"><!-- PAGE 1: Lock -->
  <div id="page1" class="page active gradient-bg flex-col items-center justify-center relative overflow-hidden">
   <div id="hearts-container" class="absolute inset-0 pointer-events-none"></div>
   <p id="lock-hint" class="text-white/70 text-lg mb-8 tracking-widest uppercase" style="font-family: 'Playfair Display', serif;">Clique para abrir...</p>
   <div class="lock-container relative" id="lockBtn" role="button" tabindex="0" aria-label="Abrir cadeado">
    <div class="lock-glow"></div>
    <div class="lock-shackle"></div>
    <div class="lock-body"></div>
   </div>
   <p class="text-white/40 text-sm mt-10 tracking-wider" style="font-family: 'Playfair Display', serif;">♥ Um segredo te espera ♥</p>
  </div><!-- PAGE 2: Love Message -->
  <div id="page2" class="page gradient-bg flex-col items-center justify-center relative overflow-hidden">
   <div id="sparkles-container" class="absolute inset-0 pointer-events-none"></div>
   <div class="love-letter fade-in-up" style="animation-delay: 0.3s;">
    <div class="heart-beat text-6xl mb-6">
     ❤️
    </div>
    <h1 id="love-title" class="text-white text-3xl md:text-4xl font-bold mb-6 leading-tight" style="font-family: 'Great Vibes', cursive;">Para o amor da minha vida</h1>
    <div class="w-16 h-0.5 bg-white/30 mx-auto mb-6 rounded-full"></div>
    <p id="love-message" class="text-white/85 text-lg md:text-xl leading-relaxed" style="font-family: 'Playfair Display', serif;">Cada momento ao seu lado é um presente. Você é a razão do meu sorriso, a luz dos meus dias e o amor da minha vida. Te amo infinitamente. 💕</p>
    <div class="mt-8 flex items-center justify-center gap-2 text-white/50 text-sm" style="font-family: 'Playfair Display', serif;"><span>Com todo meu amor</span> <span class="heart-beat">💗</span>
    </div>
   </div><button id="backBtn" class="mt-10 fade-in-up text-white/50 hover:text-white/80 transition-colors text-sm flex items-center gap-2" style="animation-delay: 1s; font-family: 'Playfair Display', serif;"> <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Voltar </button>
  </div>

  <script src="/js/script.js"></script>
  
</body>
</html>
